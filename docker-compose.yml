services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - QA_SCANNER_ZAP_BASE_URL=http://zap:8080
      - QA_SCANNER_CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    depends_on:
      - zap

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  zap:
    image: zaproxy/zap-stable
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config api.disablekey=true
    ports:
      - "8080:8080"
